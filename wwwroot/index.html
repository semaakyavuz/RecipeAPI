<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tarifler</title>
</head>
<body>

  <header class="app-header">
    <div class="header-inner">
      <h1>Tarifler</h1>
      <button id="btn-add">+ Yeni Tarif</button>
    </div>
  </header>

  <main class="container">
    <div id="recipe-list" class="recipe-grid"></div>
  </main>

  <!-- Tarif Detay Paneli -->
  <div id="detail-overlay" class="overlay hidden"></div>
  <aside id="detail-panel" class="detail-panel hidden">
    <div class="panel-header">
      <h2 id="detail-title"></h2>
      <button id="btn-close-detail" class="btn-icon">✕</button>
    </div>
    <div class="panel-body">
      <p id="detail-instructions" class="instructions"></p>

      <section class="ingredient-section">
        <h3>Malzemeler <span id="detail-base-servings" class="badge"></span></h3>
        <ul id="detail-ingredients"></ul>
      </section>

      <section class="scale-section">
        <h3>Porsiyon Ölçekleme</h3>
        <div class="scale-controls">
          <button id="btn-scale-dec" class="btn-icon">−</button>
          <span id="scale-value" class="scale-number">4</span>
          <button id="btn-scale-inc" class="btn-icon">+</button>
          <span class="scale-label">kişilik</span>
        </div>
        <ul id="scaled-ingredients" class="scaled-list"></ul>
      </section>
    </div>
  </aside>

  <!-- Tarif Ekleme Modal -->
  <div id="modal-overlay" class="overlay hidden">
    <div id="modal" class="modal">
      <div class="modal-header">
        <h2>Yeni Tarif</h2>
        <button id="btn-close-modal" class="btn-icon">✕</button>
      </div>
      <form id="form-add" class="modal-body">
        <label class="field">
          <span>Tarif Adı</span>
          <input type="text" name="title" placeholder="örn. Mercimek Çorbası" required>
        </label>
        <label class="field">
          <span>Porsiyon Sayısı</span>
          <input type="number" name="baseServings" value="4" min="1" required>
        </label>
        <label class="field">
          <span>Hazırlanışı</span>
          <textarea name="instructions" rows="3" placeholder="Tarif adımları..."></textarea>
        </label>
        <div class="field">
          <span>Malzemeler</span>
          <div id="ingredients-list"></div>
          <button type="button" id="btn-add-ingredient" class="btn-secondary">+ Malzeme Ekle</button>
        </div>
        <div class="modal-actions">
          <button type="button" id="btn-cancel" class="btn-secondary">İptal</button>
          <button type="submit" class="btn-primary">Kaydet</button>
        </div>
      </form>
    </div>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
